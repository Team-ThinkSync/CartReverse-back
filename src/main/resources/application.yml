spring:
  application:
    name: web-shop-project-back
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show-sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  springdoc:
    api-docs:
      enabled: true
      path: /v3/api-docs
    swagger-ui:
      enabled: true
      path: /swagger-ui.html
      url: /v3/api-docs
      doc-expansion: list
      default-model-expand-depth: -1
      deep-linking: true
      display-request-duration: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}   # 환경 변수 사용
    password: ${MAIL_PASSWORD}   # 환경 변수 사용
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: src/main/resources/static/images

payment:
  toss:
    test_client_api_key : ${TOSS_CLIENT_API_KEY}
    test_secret_api_key : ${TOSS_SECRET_API_KEY}